<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>BAN CHECKER</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0508;
  --acc:#e0162b;--acc2:#9b0f1e;--acc3:#ff3350;
  --glow:rgba(224,22,43,.28);
  --card-bg:rgba(28,6,10,.78);
  --border:rgba(224,22,43,.14);--border2:rgba(224,22,43,.26);
  --text:#f0d0d4;--muted:rgba(200,130,140,.42);
  --green:#00e676;--red:#ff3355;
  --fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;--fb:'Outfit',sans-serif;
}
html,body{height:100%;min-height:100%;overflow:hidden;background:var(--bg);font-family:var(--fb);color:var(--text)}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.scene{
  position:relative;z-index:1;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 14px;overflow-y:auto;
}


.card{
  width:100%;max-width:355px;
  background:var(--card-bg);
  border:1px solid var(--border2);border-radius:26px;
  backdrop-filter:blur(28px) saturate(1.6);-webkit-backdrop-filter:blur(28px) saturate(1.6);
  box-shadow:
    0 0 0 1px rgba(224,22,43,.04) inset,
    0 28px 80px rgba(0,0,0,.8),
    0 0 80px rgba(180,10,30,.07);
  position:relative;overflow:hidden;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
.card::before{
  content:'';position:absolute;top:0;left:18%;right:18%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(224,22,43,.6),rgba(255,80,80,.3),transparent);
}


.card-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0}
.c-status{display:flex;align-items:center;gap:6px;font-family:var(--fm);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.c-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:dp 2.5s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.15}}
.c-acts{display:flex;gap:5px}
.c-btn{width:30px;height:30px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:rgba(224,22,43,.04);display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background .15s}
.c-btn:active{background:rgba(224,22,43,.12);border-color:var(--border2)}
.c-btn svg{width:13px;height:13px}


.drop{position:absolute;top:50px;right:12px;z-index:50;background:rgba(18,4,8,.98);border:1px solid var(--border2);border-radius:13px;min-width:170px;box-shadow:0 16px 40px rgba(0,0,0,.75);overflow:hidden;display:none}
.drop.on{display:block;animation:dIn .12s ease}
@keyframes dIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.d-item{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;color:var(--text);font-size:13px;font-weight:500;border-bottom:1px solid var(--border);transition:background .1s}
.d-item:last-child{border:none}
.d-item:active{background:rgba(224,22,43,.06)}
.d-ic{width:24px;height:24px;border-radius:7px;background:rgba(224,22,43,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}


.vid-wrap{
  margin:14px 16px 10px;border-radius:14px;overflow:hidden;position:relative;
  background:rgba(20,4,8,.85);border:1px solid var(--border2);aspect-ratio:16/7;
  box-shadow:0 0 0 1px rgba(224,22,43,.04) inset,0 4px 24px rgba(0,0,0,.55),0 0 28px rgba(180,10,30,.07);
}
.vid-wrap::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(224,22,43,.04),transparent 60%);pointer-events:none;z-index:2}
.vid-wrap::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background:
    linear-gradient(to right,rgba(224,22,43,.3) 1px,transparent 1px) 0 0/8px 8px no-repeat,
    linear-gradient(to bottom,rgba(224,22,43,.3) 1px,transparent 1px) 0 0/8px 8px no-repeat,
    linear-gradient(to left,rgba(224,22,43,.3) 1px,transparent 1px) 100% 0/8px 8px no-repeat,
    linear-gradient(to bottom,rgba(224,22,43,.3) 1px,transparent 1px) 100% 0/8px 8px no-repeat,
    linear-gradient(to right,rgba(224,22,43,.3) 1px,transparent 1px) 0 100%/8px 8px no-repeat,
    linear-gradient(to top,rgba(224,22,43,.3) 1px,transparent 1px) 0 100%/8px 8px no-repeat,
    linear-gradient(to left,rgba(224,22,43,.3) 1px,transparent 1px) 100% 100%/8px 8px no-repeat,
    linear-gradient(to top,rgba(224,22,43,.3) 1px,transparent 1px) 100% 100%/8px 8px no-repeat;
}
.vid-wrap video,.vid-wrap iframe{width:100%;height:100%;display:block;border:none;object-fit:cover}
.vid-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;z-index:1}
.vid-ph-ic{font-size:20px;opacity:.25}
.vid-ph-txt{font-family:var(--fm);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}


.title-area{text-align:center;padding:10px 0 14px}
.title{
  font-family:var(--fh);font-size:24px;font-weight:700;letter-spacing:5px;line-height:1;
  background:linear-gradient(135deg,#fff 10%,#ffb0b8 40%,var(--acc) 65%,#ff8090 85%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:sh 7s linear infinite;background-size:250% 100%;
}
@keyframes sh{0%{background-position:200%}100%{background-position:-200%}}
.title-sub{font-family:var(--fm);font-size:8px;letter-spacing:4px;color:var(--muted);margin-top:4px}


.inputs{padding:0 14px}
.row{display:flex;gap:7px;margin-bottom:8px;align-items:stretch}
.cc-btn{
  height:50px;padding:0 12px;
  background:rgba(120,10,20,.35);border:1px solid var(--border2);border-radius:12px;
  font-family:var(--fm);font-size:14px;color:var(--acc3);cursor:pointer;
  display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0;
  transition:background .15s;box-shadow:inset 0 1px 0 rgba(224,22,43,.07);
}
.cc-btn:active{background:rgba(160,15,28,.5)}
.cc-caret{font-size:7px;opacity:.45}
.num-in{
  flex:1;height:50px;
  background:rgba(30,5,10,.55);border:1px solid var(--border);border-radius:12px;
  padding:0 14px;font-family:var(--fm);font-size:16px;letter-spacing:2px;color:#fff;
  outline:none;caret-color:var(--acc3);
  transition:border-color .2s,box-shadow .2s;
}
.num-in::placeholder{color:rgba(200,130,140,.18);font-size:11px;letter-spacing:1px}
.num-in:focus{border-color:rgba(224,22,43,.4);box-shadow:0 0 0 3px rgba(224,22,43,.06)}
.num-in.err{border-color:rgba(255,100,100,.45);box-shadow:0 0 0 3px rgba(255,50,50,.05)}
.err-msg{font-family:var(--fm);font-size:9px;letter-spacing:1.5px;color:#ff6070;min-height:12px;margin-bottom:5px;opacity:0;transition:opacity .2s;padding-left:2px}
.err-msg.on{opacity:1}

.btn-check{
  width:100%;height:50px;border:none;cursor:pointer;border-radius:13px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:6px;color:#fff;
  box-shadow:0 4px 24px var(--glow),0 0 0 1px rgba(255,80,80,.12) inset,inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;overflow:hidden;transition:transform .12s,box-shadow .12s;
  margin-bottom:14px;
}
.btn-check::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,100,100,.2),transparent 55%);pointer-events:none}
.btn-check::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);animation:shb 3.2s ease-in-out infinite}
@keyframes shb{0%{left:-100%}55%,100%{left:160%}}
.btn-check:active{transform:scale(.99);box-shadow:0 2px 14px var(--glow)}
.btn-check:disabled{opacity:.3;cursor:not-allowed}
.btn-check:disabled::after{animation:none}
.loader{display:none;align-items:center;justify-content:center;gap:9px;padding-bottom:12px;margin-top:-6px;font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--muted)}
.loader.on{display:flex}
.spin{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(224,22,43,.18);border-top-color:var(--acc3);animation:rot .6s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}


.card-foot{padding:0 14px 14px;font-family:var(--fm);font-size:7px;letter-spacing:3px;text-transform:uppercase;color:rgba(200,130,140,.18);text-align:center}
.bottom{margin-top:10px;font-family:var(--fm);font-size:7px;letter-spacing:3px;color:rgba(200,130,140,.14);text-transform:uppercase;text-align:center}


.cc-back{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.cc-back.on{display:flex}
.cc-panel{width:min(100%,400px);max-height:65vh;background:rgba(14,3,6,.98);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.7);display:flex;flex-direction:column;animation:sUp .22s cubic-bezier(.22,1,.36,1)}
@keyframes sUp{from{transform:translateY(28px);opacity:0}to{transform:none;opacity:1}}
.cc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.cc-title{font-family:var(--fh);font-size:17px;letter-spacing:2px;color:var(--text)}
.cc-x{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
.cc-search{margin:8px 14px 4px;background:rgba(30,5,10,.6);border:1px solid var(--border);border-radius:9px;padding:9px 13px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;flex-shrink:0;transition:border-color .2s}
.cc-search:focus{border-color:var(--border2)}
.cc-list{overflow-y:auto;flex:1;padding:4px 0 12px}
.cc-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(224,22,43,.04)}
.cc-item:active{background:rgba(224,22,43,.06)}
.cc-code{font-family:var(--fm);font-size:12px;color:var(--acc3);width:40px;flex-shrink:0}
.cc-name{font-size:13px;font-weight:500;color:var(--text)}

.hist-back{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.hist-back.on{display:flex}
.hist-panel{width:min(100%,400px);max-height:60vh;background:rgba(14,3,6,.98);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.7);display:flex;flex-direction:column;animation:sUp .22s cubic-bezier(.22,1,.36,1)}
.hist-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.hist-htitle{font-family:var(--fh);font-size:17px;letter-spacing:2px;color:var(--text)}
.hist-clr{font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--muted);cursor:pointer;background:none;border:none;text-transform:uppercase;transition:color .15s}
.hist-clr:active{color:var(--red)}
.hist-list{overflow-y:auto;flex:1;padding:6px 0 14px}
.hist-empty{text-align:center;padding:28px;font-family:var(--fm);font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.hist-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(224,22,43,.04)}
.hist-item:active{background:rgba(224,22,43,.05)}
.hist-num{font-family:var(--fm);font-size:13px;color:var(--text);flex:1;letter-spacing:1px}
.hbadge{font-family:var(--fm);font-size:7px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.hbadge.ok {background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.22);color:var(--green)}
.hbadge.ban{background:rgba(255,51,85,.08);border:1px solid rgba(255,51,85,.22);color:#ff5570}

.sh-back{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:flex-end;justify-content:center}
.sh-back.on{display:flex}
.sh-panel{width:min(100%,400px);background:rgba(14,3,6,.98);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;padding-bottom:max(env(safe-area-inset-bottom),20px);box-shadow:0 -8px 40px rgba(0,0,0,.7);animation:sUp .22s cubic-bezier(.22,1,.36,1)}
.sh-handle{width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,.08);margin:11px auto 0}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 12px;border-bottom:1px solid var(--border)}
.sh-title{font-family:var(--fh);font-size:17px;letter-spacing:3px;color:var(--text)}
.sh-x{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer}
.sh-body{padding:13px 16px;display:flex;flex-direction:column;gap:12px}
.sh-grp label{display:block;font-family:var(--fm);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.sh-in{width:100%;background:rgba(30,5,10,.5);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--fb);font-size:13px;outline:none;resize:none;transition:border-color .2s}
.sh-in:focus{border-color:var(--border2)}
.sh-in-link{width:100%;background:rgba(30,5,10,.5);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:var(--fm);font-size:12px;outline:none;transition:border-color .2s}
.sh-in-link:focus{border-color:var(--border2)}
.sh-row{display:flex;align-items:center;justify-content:space-between}
.sh-lbl{font-size:13px;font-weight:500}
.tog{width:38px;height:21px;border-radius:11px;background:rgba(255,255,255,.08);position:relative;cursor:pointer;transition:background .22s;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(17px)}
.sh-save{border:none;border-radius:11px;padding:12px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-family:var(--fh);font-size:15px;letter-spacing:4px;cursor:pointer;transition:transform .12s;box-shadow:0 4px 18px var(--glow)}
.sh-save:active{transform:scale(.98)}
.sh-reset{border:1px solid var(--border);border-radius:11px;padding:10px;background:none;color:var(--muted);font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer}
/
.ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(8,1,3,.7);backdrop-filter:blur(14px) saturate(1.4);-webkit-backdrop-filter:blur(14px) saturate(1.4);align-items:center;justify-content:center;padding:22px}
.ov.on{display:flex;animation:fIn .18s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.dlg{width:min(94vw,390px);background:rgba(14,3,6,.97);border-radius:20px;overflow:hidden;border:1px solid var(--border2);box-shadow:0 10px 50px rgba(0,0,0,.8);animation:popIn .23s cubic-bezier(.34,1.46,.64,1)}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:none}}
.dlg-stripe{height:3px}
.dlg.ban .dlg-stripe{background:linear-gradient(90deg,transparent,#ff2244 30%,#ff7090 65%,transparent)}
.dlg.ok  .dlg-stripe{background:linear-gradient(90deg,transparent,var(--green) 30%,#80ffb0 65%,transparent)}
.dlg-body{padding:20px 18px 16px}
.dlg-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;margin-bottom:14px;font-family:var(--fm);font-size:7px;letter-spacing:3px}
.dlg.ban .dlg-chip{background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.24);color:#ff5570}
.dlg.ok  .dlg-chip{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.22);color:var(--green)}
.chip-dot{width:4px;height:4px;border-radius:50%;animation:dp 2s infinite}
.dlg.ban .chip-dot{background:#ff5570}
.dlg.ok  .chip-dot{background:var(--green)}
.dlg-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.dlg-date{font-family:var(--fm);font-size:8px;letter-spacing:1px;color:rgba(200,130,140,.3)}
.dlg-num{font-family:var(--fm);font-size:20px;letter-spacing:2px;color:#fff;margin-bottom:5px}
.dlg-msg{font-size:12px;font-weight:600;color:rgba(255,255,255,.75);line-height:1.4;text-transform:uppercase;letter-spacing:.5px}
.dlg-meta{margin-top:16px;padding-top:11px;border-top:1px solid rgba(224,22,43,.08)}
.dlg-mr{display:flex;align-items:baseline;gap:7px;margin-bottom:5px}
.dlg-mk{font-family:var(--fm);font-size:7px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex-shrink:0}
.dlg-mv{font-size:11px;font-weight:500;color:rgba(240,210,215,.4);line-height:1.3}
.dlg-mv.hi{color:#ff5570;font-family:var(--fm);font-size:8px;letter-spacing:2px;text-transform:uppercase}
.dlg-sep{height:1px;background:rgba(224,22,43,.08)}
.dlg-foot{display:flex;align-items:center;padding:3px 6px}
.dlg-sp{flex:1}
.dlg-btn{background:none;border:none;padding:11px 13px;font-family:var(--fb);font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;color:var(--muted);border-radius:9px;transition:background .1s}
.dlg-btn:active{background:rgba(255,255,255,.04)}
.dlg-btn.acc{color:rgba(255,180,185,.7)}
.dlg-btn.red{color:#ff5570}
.dlg-vs{width:1px;height:15px;background:rgba(224,22,43,.1);align-self:center}

.fab{position:fixed;bottom:18px;right:13px;z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:7px}
.fab-links{display:flex;flex-direction:column;align-items:flex-end;gap:6px;opacity:0;pointer-events:none;transform:translateY(5px) scale(.95);transition:opacity .18s,transform .2s cubic-bezier(.34,1.4,.64,1)}
.fab-links.on{opacity:1;pointer-events:all;transform:none}
.fab-ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border2);box-shadow:0 4px 14px rgba(0,0,0,.5);transition:transform .13s;background:rgba(20,4,8,.9)}
.fab-ic:active{transform:scale(.9)}
.fab-ic.wa{border-color:rgba(0,230,118,.25)}
.fab-ic.tg{border-color:rgba(224,22,43,.22)}
.fab-ic.yt{border-color:rgba(255,51,85,.25)}
.fab-main{width:44px;height:44px;border-radius:13px;cursor:pointer;background:rgba(20,4,8,.95);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.55);font-family:var(--fb);font-weight:700;font-size:18px;color:var(--text);transition:background .18s,border-color .18s}
.fab-main.on{background:rgba(120,10,20,.3);border-color:rgba(224,22,43,.4)}
.fab-main:active{transform:scale(.93)}




.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(7px);background:rgba(14,3,6,.98);border:1px solid var(--border2);border-radius:100px;padding:7px 18px;font-family:var(--fm);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--acc3);z-index:999;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="scene">
<div class="card">

let selCC='225';
function renderCC(f=''){
  const list=g('ccList');
  const items=COUNTRIES.filter(c=>!f||c.n.toLowerCase().includes(f.toLowerCase())||c.c.includes(f));
  list.innerHTML=items.length?items.map(c=>`<div class="cc-item" onclick="pickCC('${c.c}')"><span class="cc-code">+${c.c}</span><span class="cc-name">${c.n}</span></div>`).join(''):'<div class="hist-empty">Aucun résultat</div>';

/* ── DATE ── */
function fmtDate(o,d=0){if(!o||typeof o!=='object'||d>3)return'';for(const k of['banned_at','date','timestamp','at','time']){if(o[k]){const v=o[k],dt=new Date(typeof v==='number'&&String(v).length===10?v*1000:v);if(!isNaN(dt))return`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')} · ${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;}}for(const k of Object.keys(o)){if(typeof o[k]==='object'){const r=fmtDate(o[k],d+1);if(r)return r;}}return'';}

/* ── HISTORY ── */
const HIST=[];
function addHist(num,banned){HIST.unshift({num,banned});if(HIST.length>12)HIST.pop();}
function renderHist(){const list=g('histList');if(!HIST.length){list.innerHTML='<div class="hist-empty">Aucun historique</div>';return;}list.innerHTML=HIST.map(h=>`<div class="hist-item" onclick="fillNum('${h.num}')"><span class="hist-num">${h.num}</span><span class="hbadge ${h.banned?'ban':'ok'}">${h.banned?'BANNI':'ACTIF'}</span></div>`).join('');}
function fillNum(num){const c=num.replace(/\D/g,'');for(let l=3;l>=1;l--){const cc=parseInt(c.substring(0,l));if(COUNTRIES.find(x=>x.c===String(cc))){selCC=String(cc);g('ccVal').textContent='+'+cc;g('phoneIn').value=c.substring(l);break;}}g('histBack').classList.remove('on');}

/* ── DIALOGS ── */

['dlgBan','dlgOk'].forEach(id=>g(id).addEventListener('click',e=>{if(e.target===g(id))closeDlg();}));
function showResult(banned,num,reason,data){
  addHist(num,banned);
  if(banned){g('dBanNum').textContent=num;g('dBanDate').textContent=fmtDate(data||{});g('dBanMsg').textContent=CFG.banMsg;g('dBanReason').textContent=reason||"violation des CGU";g('dlgBan').classList.add('on');}
  else{g('dOkNum').textContent=num;g('dOkMsg').textContent=CFG.okMsg;g('dlgOk').classList.add('on');}
}

/* ── CHECK ── */
g('btnCheck').addEventListener('click',async()=>{
  const raw=g('phoneIn').value.trim();
  if(!raw||raw.length<4){g('phoneIn').classList.add('err');g('errMsg').textContent='Numéro invalide';g('errMsg').classList.add('on');return;}
  const num='+'+selCC+raw;
  g('btnCheck').disabled=true;g('loader').classList.add('on');
  try{const d=await fetch('https://baron0.com/api/external/check',{method:'POST',headers:{'Content-Type':'application/json','X-Client-Key':__xk},body:JSON.stringify({number:num})}).then(r=>r.json());showResult(d.banned===true,num,d.reason||d.ban_reason||'',d);}
  catch(e){showResult(false,num,'',{});}
  finally{g('btnCheck').disabled=false;g('loader').classList.remove('on');}
});



/* ── MENU ── */
g('menuBtn').addEventListener('click',e=>{e.stopPropagation();g('drop').classList.toggle('on');});
document.addEventListener('click',()=>g('drop').classList.remove('on'));

/* ── SETTINGS ── */
g('dSettings').addEventListener('click',()=>{g('drop').classList.remove('on');g('shBan').value=CFG.banMsg;g('shOk').value=CFG.okMsg;g('togBg').className='tog'+(CFG.bg?' on':'');g('shBack').classList.add('on');});
g('shX').addEventListener('click',()=>g('shBack').classList.remove('on'));
g('shBack').addEventListener('click',e=>{if(e.target===g('shBack'))g('shBack').classList.remove('on');});
g('togBg').addEventListener('click',()=>{g('togBg').classList.toggle('on');CFG.bg=g('togBg').classList.contains('on');});
g('shSave').addEventListener('click',()=>{const b=g('shBan').value.trim(),ok=g('shOk').value.trim();if(b)CFG.banMsg=b;if(ok)CFG.okMsg=ok;g('shBack').classList.remove('on');toast('Sauvegardé');});
g('shReset').addEventListener('click',()=>{CFG.banMsg='This account can no longer use WhatsApp.';CFG.okMsg='Ce numéro est actif sur WhatsApp.';CFG.bg=true;g('shBack').classList.remove('on');toast('Réinitialisé');});

/* ── FAB ── */
let fOn=false;
g('fabMain').addEventListener('click',e=>{e.stopPropagation();fOn=!fOn;g('fabLinks').classList.toggle('on',fOn);g('fabMain').classList.toggle('on',fOn);g('fabMain').textContent=fOn?'×':'+';});
document.addEventListener('click',()=>{if(fOn){fOn=false;g('fabLinks').classList.remove('on');g('fabMain').classList.remove('on');g('fabMain').textContent='+';}});
g('fabLinks').addEventListener('click',e=>e.stopPropagation());
function oLink(u){if(u&&u.startsWith('http'))window.open(u,'_blank');}
g('fWa').addEventListener('click',()=>oLink(L_WA));
g('fTg').addEventListener('click',()=>oLink(L_TG));
g('fYt').addEventListener('click',()=>oLink(L_YT));

/* ── CANVAS ── */
(()=>{
  const cv=g('cv'),ctx=cv.getContext('2d');let W,H;
  const R=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight};R();addEventListener('resize',R);
  const orbs=Array.from({length:12},(_,i)=>({x:Math.random(),y:Math.random(),vx:(Math.random()-.5)*.00003,vy:(Math.random()-.5)*.00003,r:.7+Math.random(),t:Math.random()*6.28,ts:.002+Math.random()*.003,ci:i%2}));
  const pts=Array.from({length:35},()=>({x:Math.random(),y:Math.random(),s:.3+Math.random()*.7,a:.05+Math.random()*.18,t:Math.random()*6.28,ts:.005+Math.random()*.009}));
  function frame(){
    ctx.clearRect(0,0,W,H);
    if(!CFG.bg){requestAnimationFrame(frame);return;}
    orbs.forEach(o=>{
      o.x+=o.vx;o.y+=o.vy;o.t+=o.ts;
      if(o.x<-.1)o.x=1.1;if(o.x>1.1)o.x=-.1;if(o.y<-.1)o.y=1.1;if(o.y>1.1)o.y=-.1;
      const px=o.x*W,py=o.y*H,p=.5+.5*Math.sin(o.t),rad=(o.r+p*.7)*110;
      const c=o.ci===0?'180,10,30':'240,60,60';
      const gr=ctx.createRadialGradient(px,py,0,px,py,rad);
      gr.addColorStop(0,`rgba(${c},${.08*p})`);gr.addColorStop(.6,`rgba(${c},${.02*p})`);gr.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
    });
    pts.forEach(p=>{
      p.t+=p.ts;const b=.3+.7*Math.abs(Math.sin(p.t));
      ctx.fillStyle=`rgba(240,180,185,${p.a*b})`;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.s,0,6.28);ctx.fill();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();

/* ── TOAST ── */
function toast(m){const t=g('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._);t._=setTimeout(()=>t.classList.remove('on'),2300);}
</script>
